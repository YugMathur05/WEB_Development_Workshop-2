<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Employee Management System</title>
</head>
<body>
    <div class="container">
        <h1>Employee Management System</h1>
        <hr><br>
        <label for="name"> Employee Name :-</label>
        <input type="text" placeholder="Employee Name">
        <br><br>
        <label for="name"> Employe id :-</label>
        <input type="text" placeholder="Employee Id">
        <br><br>
        <label for="name"> Salary :-</label>
        <input type="text" placeholder="Salary">
        <br><br>
        <label for="name"> Department :-</label>
        <input type="text" placeholder="Department">
        <br><br>
        
        <button id="Add">Add Employee</button>
        <br><br>
        <button id="TotalSalary">Total Salary</button>
        <button id="DisplayAll">Display All</button>
        <button id="SalaryGreater">Salary>50k</button>
        <button id="Avg">Avg Salary</button>
        <br><br>
        <button id="Count">Count By Departement</button>
    </div>
<div id="output"></div>
    <script src="script.js"></script>
</body>
</html>
